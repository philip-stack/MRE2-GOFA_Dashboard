services:
  sman-dashboard-db:
    image: postgres:16-alpine
    container_name: sman-dashboard-db
    environment:
      POSTGRES_DB: "${SMAN_POSTGRES_DB:-sman}"
      POSTGRES_USER: "${SMAN_POSTGRES_USER:-sman}"
      POSTGRES_PASSWORD: "${SMAN_POSTGRES_PASSWORD:-sman}"
    ports:
      - "127.0.0.1:${SMAN_POSTGRES_PORT:-55433}:5432"
    volumes:
      - sman-dashboard-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  sman-gofa-dashboard:
    build: .
    container_name: sman-gofa-dashboard
    network_mode: host
    ipc: host
    command:
      - uvicorn
      - backend.app:app
      - --host
      - "${SMAN_HTTP_HOST:-127.0.0.1}"
      - --port
      - "${SMAN_HTTP_PORT:-8080}"
    depends_on:
      sman-dashboard-db:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
    environment:
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-0}"
      RMW_IMPLEMENTATION: "${RMW_IMPLEMENTATION:-rmw_fastrtps_cpp}"
      EGM_ENABLE: "${EGM_ENABLE:-0}"
      EGM_HOST: "${EGM_HOST:-0.0.0.0}"
      EGM_PORT: "${EGM_PORT:-6511}"
      SMAN_DATA_DIR: "${SMAN_DATA_DIR:-/app/data}"
      SMAN_DATABASE_URL: "${SMAN_DATABASE_URL:-postgresql://sman:sman@127.0.0.1:55433/sman}"
      SMAN_MAIL_RECIPIENTS: "${SMAN_MAIL_RECIPIENTS:-}"
      SMAN_SMTP_HOST: "${SMAN_SMTP_HOST:-}"
      SMAN_SMTP_PORT: "${SMAN_SMTP_PORT:-587}"
      SMAN_SMTP_SECURITY: "${SMAN_SMTP_SECURITY:-starttls}"
      SMAN_SMTP_USER: "${SMAN_SMTP_USER:-}"
      SMAN_SMTP_PASSWORD: "${SMAN_SMTP_PASSWORD:-}"
      SMAN_MAIL_FROM: "${SMAN_MAIL_FROM:-}"
      SMAN_HMI_USERNAME: "${SMAN_HMI_USERNAME:-Default User}"
      SMAN_HMI_PASSWORD: "${SMAN_HMI_PASSWORD:-robotics}"
      SMAN_HMI_SESSION_SECRET: "${SMAN_HMI_SESSION_SECRET:-sman-hmi-local-session-secret}"
      SMAN_HMI_COOKIE_SECURE: "${SMAN_HMI_COOKIE_SECURE:-0}"
      SMAN_HMI_REQUIRE_HTTPS: "${SMAN_HMI_REQUIRE_HTTPS:-1}"
      SMAN_HTTPS_PORT: "${SMAN_HTTPS_PORT:-8443}"
      SMAN_PUBLIC_HTTPS_URL: "${SMAN_PUBLIC_HTTPS_URL:-}"
      SMAN_HOST_INTERFACE: "${SMAN_HOST_INTERFACE:-}"
      SMAN_EXTRA_HOST_IP: "${SMAN_EXTRA_HOST_IP:-}"
      ROS_DISCOVER_TOPICS: "${ROS_DISCOVER_TOPICS:-1}"
      ROS_DISCOVER_DENYLIST: "${ROS_DISCOVER_DENYLIST:-/parameter_events,/rosout}"
      ROS_TOPICS: >
        [
          {"name": "/joint_states", "type": "sensor_msgs/msg/JointState", "label": "Joint States"},
          {"name": "/tf", "type": "tf2_msgs/msg/TFMessage", "label": "TF"},
          {"name": "/diagnostics", "type": "diagnostic_msgs/msg/DiagnosticArray", "label": "Diagnostics"}
        ]
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  sman-hmi-nginx:
    image: nginx:1.27-alpine
    container_name: sman-hmi-nginx
    network_mode: host
    depends_on:
      - sman-gofa-dashboard
    profiles:
      - https
    environment:
      SMAN_HTTPS_PORT: "${SMAN_HTTPS_PORT:-8443}"
      SMAN_SERVER_NAME: "${SMAN_SERVER_NAME:-localhost}"
      SMAN_TLS_CERT_FILE: "${SMAN_TLS_CERT_FILE:-sman-local.crt}"
      SMAN_TLS_KEY_FILE: "${SMAN_TLS_KEY_FILE:-sman-local.key}"
      DOLLAR: "$$"
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  sman-dashboard-db:
