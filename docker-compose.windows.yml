services:
  sman-gofa-dashboard:
    network_mode: bridge
    ports:
      - "127.0.0.1:${SMAN_HTTP_PORT:-8080}:8080"
    environment:
      SMAN_HTTP_HOST: "0.0.0.0"
      SMAN_DATABASE_URL: "postgresql://sman:sman@host.docker.internal:${SMAN_POSTGRES_PORT:-55433}/${SMAN_POSTGRES_DB:-sman}"
    command:
      - uvicorn
      - backend.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "${SMAN_HTTP_PORT:-8080}"

  sman-hmi-nginx:
    network_mode: bridge
    ports:
      - "127.0.0.1:${SMAN_HTTPS_PORT:-8443}:8443"
    environment:
      SMAN_UPSTREAM_HOST: "host.docker.internal"
      SMAN_UPSTREAM_PORT: "${SMAN_HTTP_PORT:-8080}"
